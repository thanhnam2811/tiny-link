version: '3.8'
services:
  postgres:
    image: postgres:17-alpine
    container_name: tiny-link-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tinylink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tiny-link-redis
    # OOM Protection: cap at 50mb and evict least-recently-used keys when full
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

volumes:
  postgres_data:
