name: CI/CD Pipeline

on:
    pull_request:
    push:
        branches:
            - main
        tags:
            - 'v*'

concurrency:
    group: pipeline-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read

jobs:
    lint_test:
        name: Lint and Test
        runs-on: ubuntu-latest
        timeout-minutes: 20
        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: admin
                    POSTGRES_PASSWORD: password
                    POSTGRES_DB: tinylink
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U admin -d tinylink"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 20
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 20
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.32.1

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Sync test database schema
              env:
                  DATABASE_URL: postgresql://admin:password@127.0.0.1:5432/tinylink
                  REDIS_URL: redis://127.0.0.1:6379
              run: pnpm --filter @tiny-link/server exec prisma db push

            - name: Lint
              run: pnpm lint

            - name: Build
              run: pnpm --filter @tiny-link/server... build

            - name: Create test env file
              run: |
                  cat > packages/server/.env.test << 'EOF'
                  DATABASE_URL=postgresql://admin:password@127.0.0.1:5432/tinylink
                  REDIS_URL=redis://127.0.0.1:6379
                  NODE_ENV=test
                  EOF

            - name: Run tests
              run: pnpm --filter @tiny-link/server test

    docker_build:
        name: Docker Build / Publish
        runs-on: ubuntu-latest
        timeout-minutes: 20
        needs: lint_test
        permissions:
            contents: read
            packages: write
        if: startsWith(github.ref, 'refs/tags/v')
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository_owner }}/tiny-link
                  tags: |
                      type=ref,event=tag
                      type=semver,pattern={{version}}
                      type=raw,value=latest

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        name: Deploy to Render
        runs-on: ubuntu-latest
        needs: docker_build
        if: startsWith(github.ref, 'refs/tags/v')
        steps:
            - name: Trigger Render Deploy Hook
              run: |
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
                  echo "Render response: $STATUS"
                  echo "$STATUS" | grep -q "^2" && echo "✅ Deploy triggered successfully" || (echo "❌ Deploy hook failed with status $STATUS" && exit 1)
