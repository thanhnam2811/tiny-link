name: CD

on:
    workflow_run:
        workflows: ['CI']
        types: [completed]
        branches: [main]

jobs:
    deploy:
        name: Deploy to Render
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        steps:
            - name: Trigger Render Deploy Hook
              run: |
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
                  echo "Render response: $STATUS"
                  echo "$STATUS" | grep -q "^2" && echo "✅ Deploy triggered successfully" || (echo "❌ Deploy hook failed with status $STATUS" && exit 1)
